name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# 참고: 스모크 테스트(npm run smoke*)는 인증된 claude/codex CLI가 필요하므로
# CI에서는 실행하지 않는다. 타입체크·빌드·Docker 이미지 빌드만 검증한다.

jobs:
  build:
    name: typecheck & build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cli-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
