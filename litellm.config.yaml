# LiteLLM 게이트웨이 라우팅
# - 임베딩(/v1/embeddings) → ollama의 bge-m3
# - 그 외 채팅(/v1/chat/completions) → localmind(claude/codex CLI)
#
# supermemory 등 소비자는 이 게이트웨이(base URL) 하나만 바라보면 된다.

model_list:
  # ── 임베딩 → ollama(bge-m3) ─────────────────────────────────
  # OpenAI 임베딩 모델명으로 와도 모두 bge-m3로 매핑한다.
  - model_name: bge-m3
    litellm_params:
      model: openai/bge-m3
      api_base: os.environ/OLLAMA_API_BASE
      api_key: ollama
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/bge-m3
      api_base: os.environ/OLLAMA_API_BASE
      api_key: ollama
  - model_name: text-embedding-3-large
    litellm_params:
      model: openai/bge-m3
      api_base: os.environ/OLLAMA_API_BASE
      api_key: ollama
  - model_name: text-embedding-ada-002
    litellm_params:
      model: openai/bge-m3
      api_base: os.environ/OLLAMA_API_BASE
      api_key: ollama

  # ── 채팅(그 외 전부) → localmind ─────────────────────────────
  # 요청 모델명을 그대로 localmind로 전달 → localmind가 claude/codex로 라우팅.
  - model_name: "*"
    litellm_params:
      model: openai/*
      api_base: http://localmind:8787/v1
      api_key: dummy

litellm_settings:
  # 백엔드가 모르는 파라미터(temperature 등)는 조용히 제거.
  drop_params: true
