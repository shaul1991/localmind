name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# 참고:
# - 단위 테스트(npm test)와 셸 테스트(scripts/*.test.sh)는 외부 의존 없이 실행되므로 CI에서 검증한다.
# - 통합 테스트(LOCALMIND_INTEGRATION=1)와 스모크 테스트(npm run smoke*)는 인증된 claude/codex
#   CLI·임베딩 서버가 필요하므로 CI에서는 실행하지 않는다(로컬 전용).

jobs:
  build:
    name: typecheck, test & build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # build를 셸 테스트보다 먼저 — mcp-install.test.sh가 dist/mcp.js(미추적 산출물)를
      # 전제한다(specs/015). 로컬은 항상 빌드돼 있어 이 순서 문제가 CI에서만 드러났다.
      - run: npm run build
      - name: shell tests
        run: |
          shopt -s nullglob   # 매치되는 *.test.sh가 없으면 리터럴 glob이 아니라 빈 목록으로 (거짓 실패 방지)
          for t in scripts/*.test.sh; do
            echo "── $t ──"
            bash "$t" || exit 1
          done
