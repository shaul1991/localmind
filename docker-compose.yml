services:
  cli2port:
    build: .
    image: cli2port
    container_name: cli2port
    ports:
      - "8787:8787"
    environment:
      - HOST=0.0.0.0
      - PORT=8787
      # 필요 시 주석 해제
      # - CLI2PORT_API_KEY=change-me
      # - DEFAULT_BACKEND=claude
      # - SESSION_MODE=auto
      # - LOG_LEVEL=info
    volumes:
      # 호스트의 CLI 구독 인증/설정을 컨테이너로 공유한다.
      # (claude/codex가 컨테이너 안에서 호스트와 동일한 계정으로 동작)
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      - ${HOME}/.codex:/root/.codex
    restart: unless-stopped

  # ── opt: 임베딩 백엔드 (profile: gateway) ─────────────────────
  # Ollama로 OpenAI 호환 /v1/embeddings 제공. 최초 기동 시 모델을 자동 pull.
  ollama:
    profiles: ["gateway"]
    image: ollama/ollama:latest
    container_name: cli2port-ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve & srv=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        echo "[ollama-init] pulling ${EMBEDDING_MODEL:-bge-m3}..."
        ollama pull ${EMBEDDING_MODEL:-bge-m3}
        wait $$srv
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  # ── opt: 통합 게이트웨이 (profile: gateway) ───────────────────
  # supermemory 등 소비자는 이 엔드포인트(4000) 하나만 바라본다.
  #   /v1/embeddings        → ollama(bge-m3)
  #   /v1/chat/completions  → cli2port(claude/codex CLI)
  litellm:
    profiles: ["gateway"]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: cli2port-gateway
    depends_on: [cli2port, ollama]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # 소비자는 이 키를 Authorization: Bearer 로 보낸다. 변경 권장.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local}
    restart: unless-stopped

volumes:
  ollama-data:
