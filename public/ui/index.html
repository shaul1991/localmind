<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>localmind 모니터링</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- KeyGate — 최초 접속/401 시 전체 화면(design.md §3) -->
  <div id="keygate" class="keygate hidden">
    <form id="keygate-form" class="keygate-card">
      <h1>localmind 모니터링</h1>
      <p id="keygate-desc">이 화면은 이 컴퓨터에서만 열 수 있어요. 접속 키(<code>LOCALMIND_API_KEY</code>)를 입력하세요.</p>
      <label for="keygate-input">접속 키</label>
      <input id="keygate-input" type="password" placeholder="접속 키" autocomplete="off" aria-describedby="keygate-desc" />
      <p id="keygate-error" class="keygate-error hidden" aria-live="polite"></p>
      <button type="submit">들어가기</button>
      <p class="dim">키 확인: <code>make secrets</code> · 새로 만들기: <code>make token</code> 후 .env에 추가</p>
    </form>
  </div>

  <div id="shell" class="shell hidden">
    <aside class="sidebar">
      <div class="brand">🧠 localmind</div>
      <nav>
        <a href="#/dashboard" data-page="dashboard">대시보드</a>
        <a href="#/config" data-page="config">설정</a>
        <a href="#/agents" data-page="agents">에이전트</a>
        <a href="#/reports" data-page="reports">리포트</a>
      </nav>
      <div class="sidebar-foot dim">읽기 전용 · 127.0.0.1 전용</div>
    </aside>
    <main id="main"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
