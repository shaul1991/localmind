# localmind 임베딩 엔진(Ollama) — 로컬에 Ollama를 직접 설치하기 어려운 환경(예: Linux 서버)용.
# 맥은 네이티브 설치가 더 빠르다(Metal): brew install ollama && ollama pull bge-m3
#
#   docker compose up -d          # ollama 기동(+bge-m3 자동 pull)
#   .env: EMBEDDINGS_URL=http://localhost:11434/v1 · EMBEDDINGS_MODEL=bge-m3 · EMBEDDINGS_KEY=dummy
#   NVIDIA GPU 가속: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# great-reduction(2026-07-21): 게이트웨이·litellm·openmemory 서비스 제거 — 임베딩은
# OpenAI 호환 엔드포인트(EMBEDDINGS_URL) 직결이 기본(specs/202607211015).
services:
  ollama:
    # [공급망 고정] digest로 고정(= ollama 0.30.11). sha256이라 업스트림 재푸시에도 불변 — 재현성 최상.
    #   버전을 올리려면: 호스트에서 `docker pull ollama/ollama:<신버전>` 후
    #   `docker image inspect ... --format '{{index .RepoDigests 0}}'`로 새 digest를 얻어 교체 후 검증.
    image: ollama/ollama@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca
    container_name: localmind-ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # CPU에선 임베딩 1건이 이미 전 코어를 쓰므로 병렬(>1)은 경합으로 더 느려진다.
      # 기본 1, GPU 등 여유가 있을 때만 올린다(gpu override가 4로 조정).
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve & srv=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        echo "[ollama-init] pulling ${EMBEDDING_MODEL:-bge-m3}..."
        ollama pull ${EMBEDDING_MODEL:-bge-m3}
        wait $$srv
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
